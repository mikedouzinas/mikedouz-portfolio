<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>THE HARLEQUIN · ENTRY reveal (sequential)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Limelight&family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#0d0b11; --champ:#e7e2d4; --champ-dim:#b8b3a4;
    --red:#b3122b; --green:#27b06f; --line:rgba(231,226,212,0.10);
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:#000; overflow:hidden;
    font-family:"Space Grotesk", system-ui, sans-serif; color:var(--champ); }
  #stage{ position:fixed; inset:0; display:grid; place-items:center; background:#000; }

  #board{ position:relative; width:min(100vw, calc(100vh * 1.6));
    height:min(100vh, calc(100vw / 1.6)); overflow:hidden; background:#000;
    box-shadow:0 0 120px rgba(0,0,0,0.8); }

  /* layer 0: the homepage we fade FROM */
  #home{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; }
  /* layer 1: the workpad backdrop we fade INTO */
  #bg{ position:absolute; inset:0; z-index:1; opacity:0;
    background-color:var(--ink);
    background-image:
      radial-gradient(120% 80% at 50% -10%, rgba(140,20,40,0.06), transparent 60%),
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:100% 100%, 80px 80px, 80px 80px; }

  /* ---- banner / header -------------------------------------------------- */
  #banner{ position:relative; z-index:5; display:flex; align-items:center; justify-content:space-between;
    padding:14px 22px; border-bottom:1px solid rgba(231,226,212,0.14);
    background:rgba(14,12,18,0.72); backdrop-filter:blur(6px);
    clip-path:inset(0 100% 0 0); }        /* revealed left -> right */
  .left{ display:flex; align-items:center; gap:16px; }
  .wordmark{ display:flex; align-items:center; gap:10px; font-family:"Limelight", serif;
    font-size:26px; letter-spacing:0.18em; color:var(--champ); white-space:nowrap; }
  .wordmark .dia{ font-size:15px; } .wordmark .dia.r{ color:var(--red); } .wordmark .dia.g{ color:var(--green); }
  .right{ display:flex; align-items:center; gap:14px; }
  .groupby{ display:flex; gap:6px; font-family:"Space Mono"; font-size:11px; color:var(--champ-dim); letter-spacing:.08em; }
  .groupby .seg{ padding:4px 10px; border:1px solid var(--line); border-radius:6px; }
  .groupby .seg.on{ color:var(--ink); background:var(--champ); border-color:var(--champ); }
  /* Cere portal — jumps into place */
  #cere{ width:46px; height:46px; border-radius:50%; display:grid; place-items:center;
    font-family:"Space Mono"; font-size:11px; letter-spacing:.06em; color:var(--green);
    border:1.5px solid var(--green); background:radial-gradient(circle at 50% 35%, rgba(39,176,111,0.22), rgba(13,11,17,0.9));
    box-shadow:0 0 18px rgba(39,176,111,0.25); }

  /* ---- columns ---------------------------------------------------------- */
  #cols{ position:relative; z-index:3; display:grid; grid-template-columns:repeat(3,1fr);
    gap:18px; padding:18px 22px; height:calc(100% - 60px); align-content:start; }
  .col{ min-width:0; }
  .colhead{ font-family:"Space Mono"; font-size:11px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--champ-dim); padding:4px 2px 12px; display:flex; align-items:center; gap:8px;
    border-bottom:1px solid var(--line); margin-bottom:12px; min-height:30px; }
  .colhead .count{ color:var(--champ); }
  .colhead .dot{ width:6px; height:6px; border-radius:50%; background:var(--green); opacity:0; }

  /* ---- cards ------------------------------------------------------------ */
  .card{ position:relative; margin-bottom:12px; padding:11px 12px; min-height:62px; }
  .card .chrome{ position:absolute; inset:0; border-radius:9px;
    background:rgba(231,226,212,0.035); border:1px solid rgba(231,226,212,0.10);
    box-shadow:0 1px 0 rgba(231,226,212,0.04) inset;
    opacity:0; transform:translateX(26px) scale(0.98); transform-origin:right center; }
  .card .content{ position:relative; z-index:2; }
  .card .meta{ font-family:"Space Mono"; font-size:10px; color:var(--champ-dim); letter-spacing:.04em; margin-bottom:5px; min-height:13px; }
  .card .title{ font-size:13px; line-height:1.35; color:var(--champ); }
  .card .title .caret{ display:inline-block; width:7px; margin-left:1px; color:var(--green); transform:translateY(1px); }
  .card .pips{ display:flex; gap:5px; margin-top:8px; }
  .card .pip{ width:5px; height:5px; border-radius:50%; opacity:0; }

  /* ---- panel ------------------------------------------------------------ */
  #panel{ position:fixed; left:16px; bottom:14px; z-index:50;
    background:rgba(13,11,17,0.86); border:1px solid rgba(231,226,212,0.22);
    border-radius:10px; padding:12px 14px; backdrop-filter:blur(8px);
    font-family:"Space Mono"; font-size:12px; width:320px; }
  #panel h1{ font-size:11px; margin:0 0 10px; letter-spacing:.18em; text-transform:uppercase; color:var(--champ); }
  .row{ display:flex; align-items:center; gap:8px; margin:7px 0; }
  .row label{ width:64px; color:var(--champ-dim); }
  .row input[type=range]{ flex:1; accent-color:var(--green); }
  .row .val{ width:42px; text-align:right; color:var(--champ); }
  .seg2{ display:flex; gap:4px; flex:1; }
  .seg2 button{ flex:1; }
  button{ background:#1a1720; color:var(--champ); border:1px solid rgba(231,226,212,0.25);
    border-radius:7px; padding:7px 4px; font:inherit; font-size:11px; cursor:pointer; letter-spacing:.05em; }
  button:hover{ border-color:var(--green); color:#fff; }
  button.primary{ background:var(--green); color:#06130c; border-color:var(--green); font-weight:700; }
  .seg2 button.on{ background:var(--green); color:#06130c; border-color:var(--green); font-weight:700; }
  .btns{ display:flex; gap:6px; margin-top:10px; }
  #hint{ position:fixed; right:16px; bottom:14px; z-index:50; font-family:"Space Mono"; font-size:11px; color:#6f6a5e; letter-spacing:.06em; }
</style>
</head>
<body>
  <div id="stage"><div id="board">
    <img id="home" alt="" />
    <div id="bg"></div>
    <header id="banner">
      <div class="left">
        <div class="wordmark"><span class="dia r">◆</span><span id="wm"></span><span class="dia g">◆</span></div>
      </div>
      <div class="right">
        <div class="groupby"><span class="seg on">Status</span><span class="seg">Repo</span></div>
        <div id="cere">Cere</div>
      </div>
    </header>
    <div id="cols"></div>
  </div></div>

  <div id="panel">
    <h1>ENTRY · reveal (sequential)</h1>
    <div class="row"><label>order</label>
      <div class="seg2">
        <button id="o1" class="on">type → box</button>
        <button id="o2">box → type</button>
      </div></div>
    <div class="row"><label>progress</label>
      <input id="prog" type="range" min="0" max="1" step="0.001" value="0" />
      <span class="val" id="progv">0.00</span></div>
    <div class="row"><label>duration</label>
      <input id="dur" type="range" min="2" max="7" step="0.1" value="4.4" />
      <span class="val" id="durv">4.4s</span></div>
    <div class="btns">
      <button id="play" class="primary">▶ Play entry</button>
      <button id="reset">Reset</button>
    </div>
  </div>
  <div id="hint">space = play · drag progress to scrub</div>

<script>
const COLORS = ['#4285f4','#ea4335','#fbbc05','#34a853'];
const DATA = [
  { head:'To do', count:38, cards:[
    { meta:'mikedouz-portfolio #8', title:'Rethink the three defining words (builder / storyteller / student)' },
    { meta:'mikedouz-portfolio',    title:'THE HARLEQUIN: mobile compatibility + reliability audit' },
    { meta:'mikedouz-portfolio',    title:'Bug: rapid Cere taps produce a hyper-clear ghost duplicate Cere' },
    { meta:'mikedouz-portfolio',    title:'Nav buttons: fix inaccurate scroll jumps + active-section highlighting' },
    { meta:'mikedouz-portfolio',    title:'Redesign the dev portal + password interface' },
  ]},
  { head:'In progress', count:1, cards:[
    { meta:'mikedouz-portfolio #14', title:'Schedule view: handle rotating-day calendar edge cases' },
  ]},
  { head:'Done', count:9, cards:[
    { meta:'mikedouz-portfolio #19', title:'Harlequin page transitions: magician-esque entry + diamond shatter exit' },
    { meta:'mikedouz-portfolio',     title:'Bug: Cere confirmed tool calls that seem never made → transparency' },
    { meta:'mikedouz-portfolio',     title:'Window portal lives in the Projects list (mistile)' },
    { meta:'mikedouz-portfolio',     title:'Cere proposal sent shown but change not applied' },
  ]},
];
const WORDMARK = 'THE HARLEQUIN';

document.getElementById('home').src = 'home.png';
const colsEl = document.getElementById('cols');
const cards = []; let gi = 0;
DATA.forEach((col)=>{
  const c=document.createElement('div'); c.className='col';
  const h=document.createElement('div'); h.className='colhead';
  h.innerHTML=`<span class="dot"></span><span class="ch-label"></span> <span class="count"></span>`;
  c.appendChild(h);
  col.cards.forEach((cd)=>{
    const card=document.createElement('div'); card.className='card';
    card.innerHTML=`<div class="chrome"></div><div class="content"><div class="meta"></div><div class="title"></div><div class="pips"></div></div>`;
    c.appendChild(card);
    const pw=card.querySelector('.pips'); const np=1+(gi%3);
    for(let k=0;k<np;k++){ const p=document.createElement('span'); p.className='pip'; p.style.background=COLORS[(gi+k)%COLORS.length]; pw.appendChild(p); }
    cards.push({ chrome:card.querySelector('.chrome'), metaEl:card.querySelector('.meta'),
      titleEl:card.querySelector('.title'), pips:[...pw.children], meta:cd.meta, title:cd.title, order:gi }); gi++;
  });
  colsEl.appendChild(c);
  col._labelEl=h.querySelector('.ch-label'); col._countEl=h.querySelector('.count'); col._dotEl=h.querySelector('.dot');
});
const NCARDS=cards.length;
const home=document.getElementById('home'), bg=document.getElementById('bg'),
      banner=document.getElementById('banner'), wmEl=document.getElementById('wm'), cere=document.getElementById('cere');

const sub=(t,a,b)=>Math.max(0,Math.min(1,(t-a)/(b-a)));
const easeOut=(x)=>1-Math.pow(1-x,3);
const easeOutBack=(x)=>{ const c1=2.2, c3=c1+1; return 1+c3*Math.pow(x-1,3)+c1*Math.pow(x-1,2); };
const typed=(s,p)=>s.slice(0, Math.round(p*s.length));

const T = {
  home:   [0.00, 0.14],   // homepage fades out
  bg:     [0.05, 0.18],   // workpad backdrop fades in
  banner: [0.15, 0.34],   // bar wipes in left -> right
  cere:   [0.30, 0.46],   // Cere jumps into place
  heads:  [0.36, 0.54],   // column headers + counts type
};

function setProgress(t){
  state.progress=t; prog.value=t; progv.textContent=t.toFixed(2);

  // 1) homepage -> workpad backdrop crossfade
  home.style.opacity=(1-sub(t,T.home[0],T.home[1])).toFixed(3);
  bg.style.opacity=sub(t,T.bg[0],T.bg[1]).toFixed(3);

  // 2) banner wipes in LEFT -> RIGHT (clip reveal), wordmark types alongside
  const bw=easeOut(sub(t,T.banner[0],T.banner[1]));
  banner.style.clipPath=`inset(0 ${((1-bw)*100).toFixed(2)}% 0 0)`;
  wmEl.textContent=typed(WORDMARK, sub(t,T.banner[0]+0.03,T.banner[1]));

  // 3) Cere jumps into place (drop + overshoot)
  const cj=sub(t,T.cere[0],T.cere[1]); const ce=easeOutBack(cj);
  cere.style.opacity=Math.min(1,cj*2).toFixed(2);
  cere.style.transform=`translateY(${(1-ce)*-22}px) scale(${0.3+0.7*ce})`;

  // 4) column headers + counts type in
  DATA.forEach((col,ci)=>{
    const hp=sub(t,T.heads[0]+ci*0.03,T.heads[1]+ci*0.03);
    col._labelEl.textContent=typed(col.head, Math.min(1,hp*1.4));
    col._countEl.textContent=hp>0.2?Math.round(easeOut(hp)*col.count):'';
    col._dotEl.style.opacity=(hp*0.9).toFixed(2);
  });

  // 5) per card — order: (1) type then box, (2) box then type
  cards.forEach((rec)=>{
    const o=rec.order/Math.max(1,NCARDS-1);
    let tStart, cStart;
    if (state.order===1){ tStart=0.50+o*0.20; cStart=0.66+o*0.24; }
    else               { cStart=0.50+o*0.22; tStart=0.62+o*0.22; }
    const tp=sub(t,tStart,tStart+0.14);
    const cp=sub(t,cStart,cStart+0.16);
    // text
    rec.metaEl.textContent=typed(rec.meta, Math.min(1,tp*1.8));
    const titleP=Math.min(1,tp);
    if (titleP>0.02 && titleP<1) rec.titleEl.innerHTML=typed(rec.title,titleP).replace(/</g,'&lt;')+'<span class="caret">▍</span>';
    else rec.titleEl.textContent=typed(rec.title,titleP);
    // chrome
    const e=easeOutBack(cp);
    rec.chrome.style.opacity=Math.min(1,cp*1.4).toFixed(3);
    rec.chrome.style.transform=`translateX(${(1-e)*26}px) scale(${0.98+0.02*e})`;
    rec.pips.forEach((p,k)=>p.style.opacity=sub(t,cStart+0.08+k*0.02,cStart+0.2).toFixed(2));
  });
}

const prog=document.getElementById('prog'), progv=document.getElementById('progv');
const dur=document.getElementById('dur'), durv=document.getElementById('durv');
const state={ progress:0, duration:4.4, order:1, playing:false, t0:0 };
const reduced=window.matchMedia('(prefers-reduced-motion: reduce)').matches;

prog.addEventListener('input',e=>{ state.playing=false; setProgress(parseFloat(e.target.value)); });
dur.addEventListener('input',e=>{ state.duration=parseFloat(e.target.value); durv.textContent=state.duration.toFixed(1)+'s'; });
const o1=document.getElementById('o1'), o2=document.getElementById('o2');
o1.onclick=()=>{ state.order=1; o1.classList.add('on'); o2.classList.remove('on'); setProgress(state.progress); };
o2.onclick=()=>{ state.order=2; o2.classList.add('on'); o1.classList.remove('on'); setProgress(state.progress); };
function play(){ if(reduced){ setProgress(1); return; } state.playing=true; state.t0=performance.now(); }
document.getElementById('play').onclick=play;
document.getElementById('reset').onclick=()=>{ state.playing=false; setProgress(0); };
window.addEventListener('keydown',e=>{ if(e.code==='Space'){ e.preventDefault(); play(); } });
window.__entry={ setProgress, state, setOrder:(o)=>{ (o===2?o2:o1).click(); } };

function frame(now){
  if(state.playing){ const t=(now-state.t0)/(state.duration*1000);
    if(t>=1){ setProgress(1); state.playing=false; } else setProgress(t<0?0:t); }
  requestAnimationFrame(frame);
}
setProgress(0); if(reduced) setProgress(1);
window.__ready=true; requestAnimationFrame(frame);
</script>
</body>
</html>
